<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisab - Admin Portal</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="admin-dashboard" class="dashboard">
        <aside class="sidebar card-solid">
            <div class="sidebar-header">
                <span style="font-size: 1.25rem; font-weight: 700; color: var(--text-main);">
                    <img src="./logo.png" alt="Logo" style="width: 28px; vertical-align: middle; margin-right: 12px; border-radius: 6px;"> 
                    Hisab Admin
                </span>
            </div>
            
            <nav class="app-nav">
                <button class="nav-btn active"><i class="fa-solid fa-gauge-high"></i> Management</button>
            </nav>

            <div class="sidebar-footer" style="margin-top: auto;">
                <button id="admin-theme-toggle" class="btn-secondary" title="Toggle Theme"><i class="fa-solid fa-moon"></i></button>
                <button id="admin-logout-btn" class="btn-secondary"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </div>
        </aside>
        
        <div class="main-wrapper">
            <header class="top-bar">
                <div class="top-bar-title">Admin Dashboard</div>
                <div class="top-bar-actions" style="display: flex; gap: 1rem; align-items: center;">
                    <div class="balance-container" style="text-align: right;">
                        <p>Global System Volume</p>
                        <h1 id="admin-total-volume">₹0.00</h1>
                    </div>
                </div>
            </header>

            <section class="summary-cards">
                <div class="card card-solid investment">
                    <div class="card-icon"><i class="fa-solid fa-users"></i></div>
                    <div class="card-info">
                        <h3>Total Users</h3>
                        <p id="admin-stats-users">0</p>
                    </div>
                </div>
                <div class="card card-solid income">
                    <div class="card-icon"><i class="fa-solid fa-file-invoice-dollar"></i></div>
                    <div class="card-info">
                        <h3>Global Transactions</h3>
                        <p id="admin-stats-transactions">0</p>
                    </div>
                </div>
            </section>

            <div class="grid-2 mt-2">
                <div class="left-col" style="flex: 2;">
                    <section class="admin-panel card-solid">
                        <h2><i class="fa-solid fa-users-gear"></i> System Users</h2>
                        <div class="table-responsive">
                            <table id="admin-users-table" class="admin-users-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Role</th>
                                        <th>Status</th>
                                        <th>Last Login</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </section>
                </div>

                <div class="right-col" style="flex: 1;">
                    <section class="admin-panel card-solid">
                        <h2><i class="fa-solid fa-clock-rotate-left"></i> Recent Activity</h2>
                        <div id="admin-activity-list" class="activity-log-container"></div>
                    </section>
                </div>
            </div>

            <section class="admin-panel card-solid mt-2">
                <h2><i class="fa-solid fa-globe"></i> All Transactions</h2>
                <div class="history-list" id="admin-tx-list"></div>
            </section>
        </div>
    </div>

    <!-- Note: This page relies on script.js for logic. 
         Session validation is handled via localStorage in script.js -->
    <script src="./script.js"></script>
    <script>
        // Ensure only admins can see this
        window.addEventListener('load', () => {
            const user = JSON.parse(localStorage.getItem('hisab_user'));
            if (!user || user.role !== 'admin') {
                window.location.href = 'index.html';
            } else {
                renderAdminDashboard();
            }
        });
    </script>
</body>
</html>
